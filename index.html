<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCODE - Landing Page</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #000000;
            color: #e7e7e7;
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Decorative Blur Backgrounds */
        .image-gradient {
            position: absolute;
            top: 0;
            right: 0;
            opacity: 0.5;
            z-index: -1;
            width: auto;
            max-width: 50vw;
        }

        .layer-blur {
            height: 0;
            width: 30rem;
            position: absolute;
            top: 20%;
            right: 0;
            box-shadow: 0 0 700px 15px rgba(255, 255, 255, 0.15);
            rotate: -30deg;
            z-index: -1;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            z-index: 999;
        }

        header .logo {
            font-size: 2.25rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        nav a {
            font-size: 0.95rem;
            color: #b3b3b3;
            letter-spacing: 0.1rem;
            transition: color 0.2s ease;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <img class="image-gradient" src="gradient.png" alt="gradient">
    <div class="layer-blur"></div>

    <div class="container">
        <header>
            <h1 class="logo">MCODE</h1>
            <nav>
                <a href="#">Company</a>
                <a href="#">Features</a>
                <a href="#">Resources</a>
                <a href="#">Contact</a>
            </nav>
        </header>
    </div>
</body>
</html>
